<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candlestick Series | TradingView Demos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', sans-serif; background: #fafafa; padding: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; color: #131722; }
        .description { background: #fff; border: 1px solid #e3e8ee; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
        .chart-container { background: #fff; border: 1px solid #e3e8ee; border-radius: 8px; overflow: hidden; }
        #container { width: 100%; height: 400px; }
        code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Candlestick Series</h1>
    <div class="description">
        <strong>Series Definition:</strong> <code>CandlestickSeries</code><br>
        <strong>Data Format:</strong> <code>CandlestickData</code> ({ time, open, high, low, close })<br>
        <strong>Опции:</strong> upColor, downColor, borderVisible, wickUpColor, wickDownColor
    </div>
    <div class="chart-container">
        <div id="container"></div>
    </div>

    <script src="https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.development.js"></script>
    <script>
        function generateCandleData(numPoints = 50) {
            const data = [];
            const date = new Date(Date.UTC(2024, 0, 1, 12, 0, 0, 0));
            let value = 100;
            for (let i = 0; i < numPoints; i++) {
                const open = value;
                const change = (Math.random() - 0.48) * 3;
                const close = value + change;
                const high = Math.max(open, close) + Math.random() * 1.5;
                const low = Math.min(open, close) - Math.random() * 1.5;
                data.push({ time: date.getTime() / 1000, open, high, low, close });
                value = close;
                date.setUTCDate(date.getUTCDate() + 1);
            }
            return data;
        }

        const chart = createChart(document.getElementById('container'), {
            layout: { background: { type: 'solid', color: '#fff' }, textColor: '#333' },
            autoSize: true,
            width: 800,
            height: 400,
        });

        const series = chart.addSeries(CandlestickSeries, {
            upColor: '#26a69a',
            downColor: '#ef5350',
            borderVisible: false,
            wickUpColor: '#26a69a',
            wickDownColor: '#ef5350',
        });

        series.setData(generateCandleData(100));
        chart.timeScale().fitContent();
    </script>
</body>
</html>
