<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baseline Series | TradingView Demos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', sans-serif; background: #131722; color: #d1d4dc; padding: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; color: #fff; }
        .description { background: #1e222d; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
        .chart-container { background: #1e222d; border-radius: 8px; overflow: hidden; }
        #container { width: 100%; height: 400px; }
        code { background: #2a2e39; padding: 2px 6px; border-radius: 4px; color: #2962ff; }
        .symbol-badge { display: inline-block; background: #2962ff; color: #fff; padding: 4px 12px; border-radius: 4px; font-size: 14px; margin-left: 10px; }
    </style>
</head>
<body>
    <h1>Baseline Series<span class="symbol-badge">BTCUSDT 1h</span></h1>
    <div class="description">
        <strong>Series:</strong> <code>BaselineSeries</code><br>
        <strong>Data Format:</strong> <code>SingleValueData</code> ({ time, value })<br>
        <strong>Source:</strong> Binance API — <span>BTC/USDT</span>
    </div>
    <div class="chart-container">
        <div id="container"></div>
    </div>

    <script src="https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.development.js"></script>
    <script>
        async function loadBinanceKlines(symbol = 'BTCUSDT', interval = '1h', limit = 100) {
            const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`;
            const response = await fetch(url);
            const data = await response.json();
            return data.map(k => ({
                time: k[0] / 1000,
                value: parseFloat(k[4]),
            }));
        }

        async function init() {
            const chart = createChart(document.getElementById('container'), {
                layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
                autoSize: true,
                width: 800,
                height: 400,
            });

            const series = chart.addSeries(BaselineSeries, {
                baseValue: { type: 'price', price: 50000 },
                topLineColor: 'rgba(38, 166, 154, 1)',
                topFillColor1: 'rgba(38, 166, 154, 0.28)',
                topFillColor2: 'rgba(38, 166, 154, 0.05)',
                bottomLineColor: 'rgba(239, 83, 80, 1)',
                bottomFillColor1: 'rgba(239, 83, 80, 0.05)',
                bottomFillColor2: 'rgba(239, 83, 80, 0.28)',
            });

            const baselineData = await loadBinanceKlines('BTCUSDT', '1h', 100);
            series.setData(baselineData);
            chart.timeScale().fitContent();
        }

        init().catch(console.error);
    </script>
</body>
</html>
