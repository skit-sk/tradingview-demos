<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histogram Series | TradingView Demos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', sans-serif; background: #fafafa; padding: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; color: #131722; }
        .description { background: #fff; border: 1px solid #e3e8ee; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
        .chart-container { background: #fff; border: 1px solid #e3e8ee; border-radius: 8px; overflow: hidden; }
        #container { width: 100%; height: 400px; }
    </style>
</head>
<body>
    <h1>Histogram Series</h1>
    <div class="description">
        <strong>Series Definition:</strong> <code>HistogramSeries</code><br>
        <strong>Data Format:</strong> <code>HistogramData</code> ({ time, value, color? })<br>
        <strong>Опции:</strong> color, base, priceFormat, priceScaleId
    </div>
    <div class="chart-container">
        <div id="container"></div>
    </div>

    <script src="https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.development.js"></script>
    <script>
        function generateHistogramData(numPoints = 100) {
            const data = [];
            const date = new Date(Date.UTC(2024, 0, 1, 12, 0, 0, 0));
            for (let i = 0; i < numPoints; i++) {
                const value = Math.random() * 50 + 10;
                const color = value > 35 ? '#ef5350' : '#26a69a';
                data.push({ time: date.getTime() / 1000, value, color });
                date.setUTCDate(date.getUTCDate() + 1);
            }
            return data;
        }

        const chart = createChart(document.getElementById('container'), {
            layout: { background: { type: 'solid', color: '#fff' }, textColor: '#333' },
            autoSize: true,
            width: 800,
            height: 400,
        });

        const series = chart.addSeries(HistogramSeries, {
            color: '#26a69a',
        });

        series.setData(generateHistogramData(100));
        chart.timeScale().fitContent();
    </script>
</body>
</html>
