<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Chart</title>
</head>
<body>
    <h1>BTCUSDT 1h - Candlestick Chart</h1>
    <div id="container" style="width: 100%; height: 400px;"></div>

    <script src="https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.development.js"></script>
    <script>
        async function loadBinanceKlines(symbol = 'BTCUSDT', interval = '1h', limit = 200) {
            const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`;
            const response = await fetch(url);
            const data = await response.json();
            return data.map(k => ({
                time: k[0] / 1000,
                open: parseFloat(k[1]),
                high: parseFloat(k[2]),
                low: parseFloat(k[3]),
                close: parseFloat(k[4]),
            }));
        }

        async function init() {
            console.log('Starting chart initialization...');
            const chart = createChart(document.getElementById('container'), {
                layout: {
                    background: { type: 'solid', color: '#131722' },
                    textColor: '#d1d4dc',
                },
                width: 800,
                height: 400,
            });

            const candlestickSeries = chart.addSeries(CandlestickSeries, {
                upColor: '#26a69a',
                downColor: '#ef5350',
                borderVisible: false,
                wickUpColor: '#26a69a',
                wickDownColor: '#ef5350',
            });

            try {
                const candleData = await loadBinanceKlines('BTCUSDT', '1h', 200);
                console.log('Loaded', candleData.length, 'candles');
                candlestickSeries.setData(candleData);
                chart.timeScale().fitContent();
                console.log('Chart rendered successfully');
            } catch (e) {
                console.error('Error loading data:', e);
            }
        }

        init().catch(console.error);
    </script>
</body>
</html>
