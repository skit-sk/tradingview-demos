<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Chart</title>
    <style>
        body { background: #131722; margin: 0; padding: 20px; }
        h1 { color: #fff; font-family: sans-serif; }
        #container { width: 100%; height: 400px; background: #1e222d; }
        #error { color: #ef5350; font-family: monospace; padding: 10px; background: #2a2e39; margin-top: 10px; display: none; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>BTCUSDT 1h - Candlestick Chart</h1>
    <div id="container"></div>
    <div id="error"></div>

    <script src="https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.development.js"></script>
    <script>
        function log(msg) {
            console.log(msg);
            const err = document.getElementById('error');
            err.textContent += msg + '\n';
            err.style.display = 'block';
        }

        function init() {
            log('init() called');

            if (typeof createChart === 'undefined') {
                log('ERROR: createChart not defined - library not loaded');
                return;
            }
            log('createChart is defined');

            const chartOptions = {
                layout: {
                    background: { type: 'solid', color: '#131722' },
                    textColor: '#d1d4dc',
                },
                width: 800,
                height: 400,
            };
            log('Creating chart...');

            const chart = createChart(document.getElementById('container'), chartOptions);
            log('Chart created');

            const candlestickSeries = chart.addSeries(CandlestickSeries, {
                upColor: '#26a69a',
                downColor: '#ef5350',
                borderVisible: false,
                wickUpColor: '#26a69a',
                wickDownColor: '#ef5350',
            });
            log('Candlestick series added');

            const url = 'https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1h&limit=200';
            log('Fetching ' + url);

            fetch(url)
                .then(response => {
                    log('Response status: ' + response.status);
                    return response.json();
                })
                .then(data => {
                    log('Received ' + data.length + ' candles');
                    const candleData = data.map(k => ({
                        time: k[0] / 1000,
                        open: parseFloat(k[1]),
                        high: parseFloat(k[2]),
                        low: parseFloat(k[3]),
                        close: parseFloat(k[4]),
                    }));
                    log('First candle: ' + JSON.stringify(candleData[0]));
                    candlestickSeries.setData(candleData);
                    log('Data set on series');
                    chart.timeScale().fitContent();
                    log('DONE - Chart should be visible');
                })
                .catch(e => {
                    log('ERROR: ' + e.message);
                });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
