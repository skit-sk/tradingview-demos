<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay Price Scale | TradingView Demos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', sans-serif; background: #131722; padding: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; color: #fff; }
        .symbol-badge { display: inline-block; background: #2962ff; color: #fff; padding: 4px 12px; border-radius: 4px; font-size: 14px; margin-left: 10px; }
        .description { background: #1e222d; border-radius: 8px; padding: 16px; margin-bottom: 20px; color: #d1d4dc; }
        .chart-container { background: #1e222d; border-radius: 8px; overflow: hidden; }
        #container { width: 100%; height: 400px; }
        code { background: #2a2e39; padding: 2px 6px; border-radius: 4px; color: #2962ff; }
    </style>
</head>
<body>
    <h1>Overlay Price Scale (Volume Indicator)<span class="symbol-badge">BTCUSDT 1h</span></h1>
    <div class="description">
        <strong>Метод:</strong> <code>priceScaleId: 'overlay'</code> для серии<br>
        <strong>Когда использовать:</strong> Индикаторы типа Volume, где значения сильно отличаются от цены<br>
        <strong>Source:</strong> Binance API
    </div>
    <div class="chart-container">
        <div id="container"></div>
    </div>

    <script src="https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.development.js"></script>
    <script>
        async function loadBinanceKlines(symbol = 'BTCUSDT', interval = '1h', limit = 100) {
            const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`;
            const response = await fetch(url);
            return await response.json();
        }

        async function init() {
            const chart = createChart(document.getElementById('container'), {
                layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
                autoSize: true,
                width: 800,
                height: 400,
            });

            const klines = await loadBinanceKlines('BTCUSDT', '1h', 100);

            const candleData = klines.map(k => ({
                time: k[0] / 1000,
                open: parseFloat(k[1]),
                high: parseFloat(k[2]),
                low: parseFloat(k[3]),
                close: parseFloat(k[4]),
            }));

            const candleSeries = chart.addSeries(CandlestickSeries, {
                upColor: '#26a69a',
                downColor: '#ef5350',
                borderVisible: false,
            });
            candleSeries.setData(candleData);

            const volumeSeries = chart.addSeries(HistogramSeries, {
                color: '#26a69a',
            });
            volumeSeries.priceScale().applyOptions({
                scaleMargins: { top: 0.8, bottom: 0 },
            });

            const volumeData = klines.map(k => ({
                time: k[0] / 1000,
                value: parseFloat(k[5]),
                color: parseFloat(k[4]) >= parseFloat(k[1]) ? 'rgba(38, 166, 154, 0.5)' : 'rgba(239, 83, 80, 0.5)',
            }));
            volumeSeries.setData(volumeData);

            chart.timeScale().fitContent();
        }

        init().catch(console.error);
    </script>
</body>
</html>
