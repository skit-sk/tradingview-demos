<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay Price Scale | TradingView Demos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', sans-serif; background: #fafafa; padding: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; color: #131722; }
        .description { background: #fff; border: 1px solid #e3e8ee; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
        .chart-container { background: #fff; border: 1px solid #e3e8ee; border-radius: 8px; overflow: hidden; }
        #container { width: 100%; height: 400px; }
        code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Overlay Price Scale (Volume Indicator)</h1>
    <div class="description">
        <strong>Метод:</strong> <code>priceScaleId: 'overlay'</code> для серии<br>
        <strong>Когда использовать:</strong> Индикаторы типа Volume, где значения сильно отличаются от цены
    </div>
    <div class="chart-container">
        <div id="container"></div>
    </div>

    <script src="https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.development.js"></script>
    <script>
        function generateCandleData(numPoints = 100) {
            const data = [];
            const date = new Date(Date.UTC(2024, 0, 1, 12, 0, 0, 0));
            let value = 100;
            for (let i = 0; i < numPoints; i++) {
                value += (Math.random() - 0.48) * 2;
                data.push({
                    time: date.getTime() / 1000,
                    open: value,
                    high: value + Math.random() * 2,
                    low: value - Math.random() * 2,
                    close: value + (Math.random() - 0.5),
                });
                date.setUTCDate(date.getUTCDate() + 1);
            }
            return data;
        }

        const chart = createChart(document.getElementById('container'), {
            layout: { background: { type: 'solid', color: '#fff' }, textColor: '#333' },
            width: document.getElementById('container').clientWidth,
            height: 400,
        });

        // Candlestick
        const candleSeries = chart.addSeries(CandlestickSeries, {
            upColor: '#26a69a',
            downColor: '#ef5350',
            borderVisible: false,
        });

        const candleData = generateCandleData(100);
        candleSeries.setData(candleData);

        // Volume histogram with overlay scale
        const volumeSeries = chart.addSeries(HistogramSeries, {
            color: '#26a69a',
        });
        volumeSeries.priceScale().applyOptions({
            scaleMargins: { top: 0.8, bottom: 0 },
        });

        const volumeData = candleData.map(d => ({
            time: d.time,
            value: Math.abs(d.close - d.open) * 5000,
            color: d.close >= d.open ? 'rgba(38, 166, 154, 0.5)' : 'rgba(239, 83, 80, 0.5)',
        }));
        volumeSeries.setData(volumeData);

        chart.timeScale().fitContent();

        window.addEventListener('resize', () => {
            chart.applyOptions({ width: document.getElementById('container').clientWidth });
        });
    </script>
</body>
</html>
