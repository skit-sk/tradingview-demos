<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Theme | TradingView Demos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', sans-serif; background: #1e222d; padding: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; color: #d1d4dc; }
        .description { background: #2a2e39; border: 1px solid #3a3e4a; border-radius: 8px; padding: 16px; margin-bottom: 20px; color: #d1d4dc; }
        .chart-container { background: #131722; border: 1px solid #3a3e4a; border-radius: 8px; overflow: hidden; }
        #container { width: 100%; height: 400px; }
        code { background: #3a3e4a; padding: 2px 6px; border-radius: 4px; color: #e0e0e0; }
    </style>
</head>
<body>
    <h1>Dark Theme</h1>
    <div class="description">
        <strong>Ключевые параметры:</strong><br>
        <code>layout.background.color: '#131722'</code><br>
        <code>layout.textColor: '#d1d4dc'</code><br>
        <code>grid.vertLines.color: '#1e222d'</code><br>
        <code>grid.horzLines.color: '#1e222d'</code>
    </div>
    <div class="chart-container">
        <div id="container"></div>
    </div>

    <script src="https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.development.js"></script>
    <script>
        function generateData(numPoints = 100) {
            const data = [];
            const date = new Date(Date.UTC(2024, 0, 1, 12, 0, 0, 0));
            let value = 100;
            for (let i = 0; i < numPoints; i++) {
                value += (Math.random() - 0.48) * 2;
                data.push({ time: date.getTime() / 1000, value });
                date.setUTCDate(date.getUTCDate() + 1);
            }
            return data;
        }

        const chart = createChart(document.getElementById('container'), {
            layout: {
                background: { type: 'solid', color: '#131722' },
                textColor: '#d1d4dc',
            },
            grid: {
                vertLines: { color: '#1e222d' },
                horzLines: { color: '#1e222d' },
            },
            crosshair: {
                vertLine: { color: '#787b86', labelBackgroundColor: '#2962ff' },
                horzLine: { color: '#787b86', labelBackgroundColor: '#2962ff' },
            },
            autoSize: true,
            width: 800,
            height: 400,
        });

        const areaSeries = chart.addSeries(AreaSeries, {
            lineColor: '#2962FF',
            topColor: 'rgba(41, 98, 255, 0.28)',
            bottomColor: 'rgba(41, 98, 255, 0.05)',
        });

        areaSeries.setData(generateData(100));
        chart.timeScale().fitContent();
    </script>
</body>
</html>
