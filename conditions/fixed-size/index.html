<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Size | TradingView Demos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', sans-serif; background: #131722; padding: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; color: #fff; }
        .symbol-badge { display: inline-block; background: #2962ff; color: #fff; padding: 4px 12px; border-radius: 4px; font-size: 14px; margin-left: 10px; }
        .description { background: #1e222d; border-radius: 8px; padding: 16px; margin-bottom: 20px; color: #d1d4dc; }
        .wrapper { display: flex; gap: 40px; flex-wrap: wrap; }
        .chart-box { display: flex; flex-direction: column; align-items: center; }
        .chart-label { margin-top: 10px; font-size: 14px; color: #787b86; }
        #container-small { width: 300px; height: 200px; border: 2px solid #26a69a; border-radius: 8px; }
        #container-medium { width: 500px; height: 300px; border: 2px solid #2962ff; border-radius: 8px; }
        #container-large { width: 800px; height: 400px; border: 2px solid #ef5350; border-radius: 8px; }
        code { background: #2a2e39; padding: 2px 6px; border-radius: 4px; color: #2962ff; }
    </style>
</head>
<body>
    <h1>Fixed Size Charts<span class="symbol-badge">BTCUSDT 1h</span></h1>
    <div class="description">
        <strong>Ключевые параметры:</strong><br>
        <code>width: number</code> — фиксированная ширина<br>
        <code>height: number</code> — фиксированная высота<br>
        <code>autoSize: false</code> (по умолчанию)<br>
        <strong>Source:</strong> Binance API
    </div>
    <div class="wrapper">
        <div class="chart-box">
            <div id="container-small"></div>
            <div class="chart-label">300 x 200</div>
        </div>
        <div class="chart-box">
            <div id="container-medium"></div>
            <div class="chart-label">500 x 300</div>
        </div>
        <div class="chart-box">
            <div id="container-large"></div>
            <div class="chart-label">800 x 400</div>
        </div>
    </div>

    <script src="https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.development.js"></script>
    <script>
        async function loadBinanceKlines(symbol = 'BTCUSDT', interval = '1h', limit = 80) {
            const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`;
            const response = await fetch(url);
            const data = await response.json();
            return data.map(k => ({
                time: k[0] / 1000,
                value: parseFloat(k[4]),
            }));
        }

        async function init() {
            const klines = await loadBinanceKlines('BTCUSDT', '1h', 80);

            const chartSmall = createChart(document.getElementById('container-small'), {
                layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
                width: 300,
                height: 200,
            });
            chartSmall.addSeries(LineSeries, { color: '#26a69a' }).setData(klines.slice(0, 30));
            chartSmall.timeScale().fitContent();

            const chartMedium = createChart(document.getElementById('container-medium'), {
                layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
                width: 500,
                height: 300,
            });
            chartMedium.addSeries(LineSeries, { color: '#2962ff' }).setData(klines.slice(0, 50));
            chartMedium.timeScale().fitContent();

            const chartLarge = createChart(document.getElementById('container-large'), {
                layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
                width: 800,
                height: 400,
            });
            chartLarge.addSeries(LineSeries, { color: '#ef5350' }).setData(klines);
            chartLarge.timeScale().fitContent();
        }

        init().catch(console.error);
    </script>
</body>
</html>
