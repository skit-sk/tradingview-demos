<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Fixed Size</title>
    <style>
        body { margin: 0; padding: 0; background: #131722; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .wrapper { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; }
        .chart-box { display: flex; flex-direction: column; align-items: center; }
        .chart-label { margin-top: 10px; font-size: 14px; color: #787b86; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="chart-box">
            <div id="container-small" style="width: 300px; height: 200px; border: 2px solid #26a69a;"></div>
            <div class="chart-label">300 x 200</div>
        </div>
        <div class="chart-box">
            <div id="container-medium" style="width: 500px; height: 300px; border: 2px solid #2962ff;"></div>
            <div class="chart-label">500 x 300</div>
        </div>
        <div class="chart-box">
            <div id="container-large" style="width: 800px; height: 400px; border: 2px solid #ef5350;"></div>
            <div class="chart-label">800 x 400</div>
        </div>
    </div>
    <script>
        (async function() {
            const response = await fetch('https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.development.js');
            const scriptText = await response.text();
            const scriptEl = document.createElement('script');
            scriptEl.textContent = scriptText;
            document.head.appendChild(scriptEl);

            const { createChart, LineSeries } = window.LightweightCharts;

            const klinesRes = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1h&limit=80');
            const klines = await klinesRes.json();
            const lineData = klines.map(k => ({ time: k[0] / 1000, value: parseFloat(k[4]) }));

            const chartSmall = createChart(document.getElementById('container-small'), {
                layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
                width: 300, height: 200,
            });
            chartSmall.addSeries(LineSeries, { color: '#26a69a' }).setData(lineData.slice(0, 30));
            chartSmall.timeScale().fitContent();

            const chartMedium = createChart(document.getElementById('container-medium'), {
                layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
                width: 500, height: 300,
            });
            chartMedium.addSeries(LineSeries, { color: '#2962ff' }).setData(lineData.slice(0, 50));
            chartMedium.timeScale().fitContent();

            const chartLarge = createChart(document.getElementById('container-large'), {
                layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
                width: 800, height: 400,
            });
            chartLarge.addSeries(LineSeries, { color: '#ef5350' }).setData(lineData);
            chartLarge.timeScale().fitContent();
        })();
    </script>
</body>
</html>
