<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locale i18n | TradingView Demos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', sans-serif; background: #131722; padding: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; color: #fff; }
        .symbol-badge { display: inline-block; background: #2962ff; color: #fff; padding: 4px 12px; border-radius: 4px; font-size: 14px; margin-left: 10px; }
        .description { background: #1e222d; border-radius: 8px; padding: 16px; margin-bottom: 20px; color: #d1d4dc; }
        .chart-container { background: #1e222d; border-radius: 8px; overflow: hidden; }
        #container { width: 100%; height: 400px; }
        code { background: #2a2e39; padding: 2px 6px; border-radius: 4px; color: #2962ff; }
    </style>
</head>
<body>
    <h1>Localization (i18n)<span class="symbol-badge">BTCUSDT 1h</span></h1>
    <div class="description">
        <strong>Параметры:</strong><br>
        <code>localization.locale: 'ru-RU'</code> — русская локаль<br>
        <code>localization.dateFormat: 'dd/MM/yy'</code> — формат даты<br>
        <code>timeScale.timeVisible: true</code> — видимое время<br>
        <strong>Source:</strong> Binance API
    </div>
    <div class="chart-container">
        <div id="container"></div>
    </div>

    <script src="https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.development.js"></script>
    <script>
        async function loadBinanceKlines(symbol = 'BTCUSDT', interval = '1h', limit = 50) {
            const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`;
            const response = await fetch(url);
            const data = await response.json();
            return data.map(k => ({
                time: k[0] / 1000,
                value: parseFloat(k[4]),
            }));
        }

        async function init() {
            const chart = createChart(document.getElementById('container'), {
                layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
                localization: {
                    locale: 'ru-RU',
                    dateFormat: 'dd/MM/yy',
                },
                timeScale: {
                    timeVisible: true,
                    secondsVisible: false,
                },
                autoSize: true,
                width: 800,
                height: 400,
            });

            const series = chart.addSeries(AreaSeries, {
                lineColor: '#2962FF',
                topColor: 'rgba(41, 98, 255, 0.28)',
                bottomColor: 'rgba(41, 98, 255, 0.05)',
            });

            const areaData = await loadBinanceKlines('BTCUSDT', '1h', 50);
            series.setData(areaData);
            chart.timeScale().fitContent();
        }

        init().catch(console.error);
    </script>
</body>
</html>
