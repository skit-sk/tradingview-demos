<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Series | TradingView Demos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', sans-serif; background: #fafafa; padding: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; color: #131722; }
        .description { background: #fff; border: 1px solid #e3e8ee; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
        .chart-container { background: #fff; border: 1px solid #e3e8ee; border-radius: 8px; overflow: hidden; }
        #container { width: 100%; height: 400px; }
    </style>
</head>
<body>
    <h1>Multiple Series on One Chart</h1>
    <div class="description">
        <strong>Метод:</strong> Несколько <code>chart.addSeries()</code> на одном графике<br>
        <strong>Когда использовать:</strong> Сравнение нескольких активов, MA overlay, объём + цена
    </div>
    <div class="chart-container">
        <div id="container"></div>
    </div>

    <script src="https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.development.js"></script>
    <script>
        function generateData(numPoints = 100, startValue = 100) {
            const data = [];
            const date = new Date(Date.UTC(2024, 0, 1, 12, 0, 0, 0));
            let value = startValue;
            for (let i = 0; i < numPoints; i++) {
                value += (Math.random() - 0.48) * 2;
                data.push({ time: date.getTime() / 1000, value });
                date.setUTCDate(date.getUTCDate() + 1);
            }
            return data;
        }

        const chart = createChart(document.getElementById('container'), {
            layout: { background: { type: 'solid', color: '#fff' }, textColor: '#333' },
            width: document.getElementById('container').clientWidth,
            height: 400,
        });

        // Candlestick (main)
        const candleSeries = chart.addSeries(CandlestickSeries, {
            upColor: '#26a69a',
            downColor: '#ef5350',
            borderVisible: false,
            wickUpColor: '#26a69a',
            wickDownColor: '#ef5350',
        });
        const candleData = generateData(100).map(d => ({
            ...d,
            open: d.value,
            high: d.value + 1,
            low: d.value - 1,
            close: d.value + (Math.random() - 0.5),
        }));
        candleSeries.setData(candleData);

        // Moving Average 1
        const ma1Series = chart.addSeries(LineSeries, {
            color: '#2962FF',
            lineWidth: 1,
        });
        const ma1Data = generateData(100, 98);
        ma1Series.setData(ma1Data);

        // Moving Average 2
        const ma2Series = chart.addSeries(LineSeries, {
            color: '#ef5350',
            lineWidth: 1,
        });
        const ma2Data = generateData(100, 96);
        ma2Series.setData(ma2Data);

        chart.timeScale().fitContent();

        window.addEventListener('resize', () => {
            chart.applyOptions({ width: document.getElementById('container').clientWidth });
        });
    </script>
</body>
</html>
