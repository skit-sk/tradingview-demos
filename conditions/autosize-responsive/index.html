<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoSize Responsive | TradingView Demos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', sans-serif; background: #131722; padding: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; color: #fff; }
        .symbol-badge { display: inline-block; background: #2962ff; color: #fff; padding: 4px 12px; border-radius: 4px; font-size: 14px; margin-left: 10px; }
        .description { background: #1e222d; border-radius: 8px; padding: 16px; margin-bottom: 20px; color: #d1d4dc; }
        code { background: #2a2e39; padding: 2px 6px; border-radius: 4px; color: #2962ff; }
        .info { background: #1e222d; border: 1px solid #2962ff; border-radius: 8px; padding: 12px; margin-bottom: 20px; color: #d1d4dc; font-size: 14px; }
        #container { width: 100%; height: 400px; border: 2px dashed #2962ff; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>AutoSize Responsive Chart<span class="symbol-badge">BTCUSDT 1h</span></h1>
    <div class="description">
        <strong>Ключевой параметр:</strong> <code>autoSize: true</code><br>
        Chart автоматически resize при изменении размера контейнера (через ResizeObserver).
    </div>
    <div class="info">
        Измените размер окна браузера — график адаптируется автоматически.
    </div>
    <div id="container"></div>

    <script src="https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.development.js"></script>
    <script>
        async function loadBinanceKlines(symbol = 'BTCUSDT', interval = '1h', limit = 100) {
            const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`;
            const response = await fetch(url);
            const data = await response.json();
            return data.map(k => ({
                time: k[0] / 1000,
                value: parseFloat(k[4]),
            }));
        }

        async function init() {
            const chart = createChart(document.getElementById('container'), {
                layout: {
                    background: { type: 'solid', color: '#131722' },
                    textColor: '#d1d4dc',
                },
                autoSize: true,
            });

            const series = chart.addSeries(AreaSeries, {
                lineColor: '#2962FF',
                topColor: 'rgba(41, 98, 255, 0.28)',
                bottomColor: 'rgba(41, 98, 255, 0.05)',
            });

            const areaData = await loadBinanceKlines('BTCUSDT', '1h', 100);
            series.setData(areaData);
            chart.timeScale().fitContent();
        }

        init().catch(console.error);
    </script>
</body>
</html>
