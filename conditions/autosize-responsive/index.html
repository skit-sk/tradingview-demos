<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoSize Responsive | TradingView Demos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', sans-serif; background: #fafafa; padding: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; color: #131722; }
        .description { background: #fff; border: 1px solid #e3e8ee; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
        code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; }
        .info { background: #e8f4fd; border: 1px solid #b8daff; border-radius: 8px; padding: 12px; margin-bottom: 20px; color: #1a5fa8; font-size: 14px; }
        #container { width: 100%; height: 400px; border: 2px dashed #2962ff; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>AutoSize Responsive Chart</h1>
    <div class="description">
        <strong>Ключевой параметр:</strong> <code>autoSize: true</code><br>
        Chart автоматически resize при изменении размера контейнера (через ResizeObserver).
    </div>
    <div class="info">
        ℹ️ Измените размер окна браузера — график адаптируется автоматически.
    </div>
    <div id="container"></div>

    <script src="https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.development.js"></script>
    <script>
        function generateData(numPoints = 100) {
            const data = [];
            const date = new Date(Date.UTC(2024, 0, 1, 12, 0, 0, 0));
            let value = 100;
            for (let i = 0; i < numPoints; i++) {
                value += (Math.random() - 0.48) * 2;
                data.push({ time: date.getTime() / 1000, value });
                date.setUTCDate(date.getUTCDate() + 1);
            }
            return data;
        }

        const chart = createChart(document.getElementById('container'), {
            layout: {
                background: { type: 'solid', color: '#fff' },
                textColor: '#333',
            },
            autoSize: true,
        });

        const series = chart.addSeries(AreaSeries, {
            lineColor: '#2962FF',
            topColor: 'rgba(41, 98, 255, 0.28)',
            bottomColor: 'rgba(41, 98, 255, 0.05)',
        });

        series.setData(generateData(100));
        chart.timeScale().fitContent();
    </script>
</body>
</html>
