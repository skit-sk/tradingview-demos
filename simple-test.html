<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Library Test</title>
    <style>
        body { background: #131722; margin: 0; padding: 20px; font-family: sans-serif; color: #fff; }
        #chart { width: 800px; height: 400px; background: #1e222d; }
        #log { margin-top: 20px; color: #0f0; white-space: pre-wrap; font-size: 12px; }
    </style>
</head>
<body>
    <h1>Library Test</h1>
    <div id="chart"></div>
    <div id="log"></div>

    <script src="https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.development.js"></script>

    <script>
        function log(msg) {
            console.log(msg);
            document.getElementById('log').textContent += msg + '\n';
        }

        log('Library loaded');
        log('typeof createChart: ' + typeof createChart);
        log('typeof CandlestickSeries: ' + typeof CandlestickSeries);

        if (typeof createChart === 'function') {
            const chart = createChart(document.getElementById('chart'), {
                layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
                width: 800,
                height: 400
            });
            log('Chart created');

            const series = chart.addSeries(CandlestickSeries, {
                upColor: '#26a69a',
                downColor: '#ef5350'
            });
            log('Series added');

            series.setData([
                { time: '2026-02-28', open: 76184, high: 76274.8, low: 74937.52, close: 75513.91 },
                { time: '2026-03-01', open: 75513.92, high: 75591.83, low: 75302.31, close: 75563.86 },
                { time: '2026-03-02', open: 75563.87, high: 75857.32, low: 75497.43, close: 75676.79 },
                { time: '2026-03-03', open: 75676.79, high: 76088.9, low: 75607.7, close: 75933.93 },
                { time: '2026-03-04', open: 75933.94, high: 76004.14, low: 75818.14, close: 75957.18 }
            ]);
            log('Data set');

            chart.timeScale().fitContent();
            log('DONE');
        } else {
            log('ERROR: createChart not a function');
        }
    </script>
</body>
</html>
