<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Advanced Chart Widget</title>
    <style>body { margin: 0; padding: 0; background: #131722; }</style>
</head>
<body>
    <div id="widget-container"></div>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
    new TradingView.widget({
        "symbol": "BITSTAMP:BTCUSD",
        "interval": "D",
        "container_id": "widget-container",
        "width": "100%",
        "height": "100%",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "toolbar_bg": "#1e222d",
        "enable_publishing": false,
        "allow_symbol_change": true,
        "hide_top_toolbar": false,
        "hide_legend": false,
        "withdateranges": true,
        "hide_side_toolbar": false,
        "details": true,
        "hotlist": true
    });
    </script>
</body>
</html>
