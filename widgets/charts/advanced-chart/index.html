<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Advanced Chart Widget</title>
    <style>
        body { margin: 0; padding: 0; background: #0F0F0F; height: 100vh; overflow: hidden; }
        .tradingview-widget-container { width: 100%; height: 100%; position: relative; }
        .tradingview-widget-container__widget { width: 100%; height: 100%; }
        .tradingview-widget-copyright { display: none; }
    </style>
</head>
<body>
<div class="tradingview-widget-container">
  <div class="tradingview-widget-container__widget"></div>
  <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
  {
  "symbol": "BINANCE:BTCUSDT",
  "interval": "D",
  "timezone": "exchange",
  "theme": "dark",
  "style": "1",
  "locale": "en",
  "backgroundColor": "#0F0F0F",
  "toolbarBg": "#1e222d",
  "enable_publishing": false,
  "allow_symbol_change": true,
  "hide_top_toolbar": false,
  "hide_legend": false,
  "save_image": false,
  "withdateranges": true,
  "hide_side_toolbar": false,
  "details": true,
  "hotlist": true,
  "hide_volume": false,
  "support_host": "https://www.tradingview.com",
  "width": "100%",
  "height": "100%"
}
  </script>
</div>
</body>
</html>
