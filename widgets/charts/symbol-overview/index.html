<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Symbol Overview Widget</title>
    <style>
        html, body { margin: 0; padding: 0; background: #0F0F0F; width: 100%; height: 100%; }
        .tradingview-widget-container { width: 100%; height: 100%; }
    </style>
</head>
<body>
<div class="tradingview-widget-container" style="width:280px;height:160px">
  <div class="tradingview-widget-container__widget" style="width:280px;height:160px"></div>
</div>
<script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
{
"lineWidth": 1,
"lineType": 0,
"chartType": "area",
"showVolume": false,
"fontColor": "rgb(106, 109, 120)",
"gridLineColor": "rgba(242, 242, 242, 0.03)",
"backgroundColor": "#0F0F0F",
"widgetFontColor": "#DBDBDB",
"upColor": "#22ab94",
"downColor": "#f7525f",
"borderUpColor": "#22ab94",
"borderDownColor": "#f7525f",
"wickUpColor": "#22ab94",
"wickDownColor": "#f7525f",
"colorTheme": "dark",
"isTransparent": false,
"locale": "en",
"chartOnly": true,
"scalePosition": "right",
"scaleMode": "Normal",
"fontFamily": "-apple-system, BlinkMacSystemFont, Trebuchet MS, Roboto, Ubuntu, sans-serif",
"valuesTracking": "1",
"changeMode": "price-and-percent",
"symbols": [["BINANCE:BTCUSDT|1D"]],
"dateRanges": ["1d|1", "1m|30", "3m|60", "12m|1D"],
"fontSize": 9,
"headerFontSize": 10,
"autosize": false,
"width": 280,
"height": 160,
"noTimeScale": true,
"hideDateRanges": true,
"showMA": false,
"hideMarketStatus": true,
"hideSymbolLogo": true
}
</script>
</body>
</html>
