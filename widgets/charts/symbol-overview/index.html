<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Symbol Overview Widget</title>
    <style>body { margin: 0; padding: 0; background: #131722; }</style>
</head>
<body>
    <div id="widget-container"></div>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
    new TradingView.widget({
        "symbol": "BITSTAMP:BTCUSD",
        "width": "100%",
        "height": "100%",
        "locale": "en",
        "colorTheme": "dark",
        "isTransparent": false,
        "autosize": true,
        "dateRange": "1M",
        "showVolume": true,
        "showMA": true,
        "hideDateRange": false,
        "hideMarketStatus": false,
        "hideSymbolLogo": false,
        "scalePosition": "right",
        "isHollowCandle": false,
        "upColor": "#26a69a",
        "downColor": "#ef5350"
    });
    </script>
</body>
</html>
