<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Symbol Overview Widget</title>
    <style>
        html, body { margin: 0; padding: 0; background: #0F0F0F; width: 280px; height: 160px; }
    </style>
</head>
<body>
<div id="widget-container" style="width:280px;height:160px"></div>
<script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
{
"autosize": false,
"width": 280,
"height": 160,
"symbol": "BINANCE:BTCUSDT",
"colorTheme": "dark",
"isTransparent": false,
"locale": "en",
"chartOnly": false,
"showVolume": false,
"showMA": false,
"hideDateRanges": true,
"hideMarketStatus": true,
"hideSymbolLogo": true,
"scalePosition": "right",
"scaleMode": "Normal",
"fontSize": 9,
"headerFontSize": 10,
"noTimeScale": false,
"dateRange": "1M",
"chartType": "area"
}
</script>
</body>
</html>
