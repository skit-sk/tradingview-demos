<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mini Chart Widget</title>
    <style>
        body { margin: 0; padding: 0; background: #131722; }
        .widget-wrapper { display: inline-block; width: 200px; margin: 10px; vertical-align: top; }
        .widget-wrapper h3 { margin: 0; padding: 8px; background: #1e222d; text-align: center; font-size: 12px; color: #d1d4dc; border-radius: 4px 4px 0 0; }
        #container { width: 200px; height: 150px; background: #131722; }
    </style>
</head>
<body>
    <div class="widget-wrapper">
        <h3>BTC/USD</h3>
        <div id="container"></div>
    </div>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
    new TradingView.widget({
        "symbol": "BITSTAMP:BTCUSD",
        "interval": "D",
        "container_id": "container",
        "width": 200,
        "height": 150,
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "toolbar_bg": "#1e222d",
        "enable_publishing": false,
        "hide_top_toolbar": true,
        "hide_side_toolbar": true,
        "allow_symbol_change": true
    });
    </script>
</body>
</html>
