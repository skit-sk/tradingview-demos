<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mini Chart Widget</title>
    <style>
        body { margin: 0; padding: 0; background: #131722; }
        .widgets-row { display: flex; gap: 20px; flex-wrap: wrap; padding: 20px; }
        .widget-wrapper { flex: 1; min-width: 300px; border: 1px solid #1e222d; border-radius: 8px; overflow: hidden; }
        .widget-wrapper h3 { margin: 0; padding: 10px; background: #1e222d; text-align: center; font-size: 14px; color: #d1d4dc; }
        iframe { width: 100%; height: 200px; border: none; }
    </style>
</head>
<body>
    <div class="widgets-row">
        <div class="widget-wrapper">
            <h3>BTC/USD</h3>
            <iframe src="https://www.tradingview.com/widget/mini-chart/?symbol=BITSTAMP%3ABTCUSD" allow="fullscreen"></iframe>
        </div>
        <div class="widget-wrapper">
            <h3>ETH/USD</h3>
            <iframe src="https://www.tradingview.com/widget/mini-chart/?symbol=BITSTAMP%3AETHUSD" allow="fullscreen"></iframe>
        </div>
        <div class="widget-wrapper">
            <h3>S&P 500</h3>
            <iframe src="https://www.tradingview.com/widget/mini-chart/?symbol=OANDA%3ASPX500USD" allow="fullscreen"></iframe>
        </div>
    </div>
</body>
</html>
