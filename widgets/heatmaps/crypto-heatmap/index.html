<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Crypto Heatmap Widget</title>
    <style>body { margin: 0; padding: 0; background: #131722; }</style>
</head>
<body>
    <div id="widget-container"></div>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
    new TradingView.widget({
        "width": "100%",
        "height": "100%",
        "locale": "en",
        "darkMode": true,
        "symbol": "CRYPTOCAP:TOTAL",
        "isTransparent": false,
        "showSymbolLogo": true,
        "market": "crypto"
    });
    </script>
</body>
</html>
