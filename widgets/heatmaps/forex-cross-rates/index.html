<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Forex Cross Rates Widget</title>
    <style>body { margin: 0; padding: 0; background: #131722; }</style>
</head>
<body>
    <div id="widget-container"></div>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
    new TradingView.widget({
        "width": "100%",
        "height": "100%",
        "locale": "en",
        "darkMode": true,
        "isTransparent": false,
        "showSymbolLogo": true,
        "showCurrency": true,
        "groups": [
            {
                "title": "Forex",
                "symbols": [
                    ["EUR/USD", "FX:EURUSD"],
                    ["GBP/USD", "FX:GBPUSD"],
                    ["USD/JPY", "FX:USDJPY"]
                ]
            }
        ]
    });
    </script>
</body>
</html>
