<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Stock Heatmap Widget</title>
    <style>body { margin: 0; padding: 0; background: #131722; }</style>
</head>
<body>
    <div id="widget-container"></div>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
    new TradingView.widget({
        "width": "100%",
        "height": "100%",
        "locale": "en",
        "darkMode": true,
        "symbol": "FOREXCOM:SPXUSD",
        "isTransparent": false,
        "showSymbolLogo": true,
        "market": "stock",
        "groups": [
            {
                "name": "Sectors",
                "symbols": [
                    ["Technology", "NASDAQ:MSFT"],
                    ["Finance", "NYSE:JPM"],
                    ["Healthcare", "NYSE:UNH"]
                ]
            }
        ]
    });
    </script>
</body>
</html>
