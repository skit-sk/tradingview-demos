<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Market Overview Widget</title>
    <style>
        body { margin: 0; padding: 0; background: #0F0F0F; height: 100vh; overflow: hidden; }
        .tradingview-widget-container { width: 100%; height: 100%; position: relative; }
        .tradingview-widget-container__widget { width: 100%; height: 100%; }
        .tradingview-widget-copyright { display: none; }
    </style>
</head>
<body>
<div class="tradingview-widget-container">
  <div class="tradingview-widget-container__widget"></div>
  <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
  {
  "colorTheme": "dark",
  "dateRange": "1M",
  "showChart": true,
  "locale": "en",
  "width": "100%",
  "height": "100%",
  "groups": [
    {
      "title": "Indices",
      "symbols": [
        ["OANDA:SPX500USD", "S&P 500"],
        ["OANDA:NS100USD", "NASDAQ"],
        ["OANDA:DJIUSD", "Dow Jones"]
      ],
      "showSymbolLogo": true,
      "showSymbolLabel": true
    },
    {
      "title": "Crypto",
      "symbols": [
        ["BINANCE:BTCUSD", "Bitcoin"],
        ["BINANCE:ETHUSD", "Ethereum"]
      ],
      "showSymbolLogo": true,
      "showSymbolLabel": true
    }
  ]
}
  </script>
</div>
</body>
</html>
