<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Market Data Widget</title>
    <style>body { margin: 0; padding: 0; background: #131722; }</style>
</head>
<body>
    <div id="widget-container"></div>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
    new TradingView.widget({
        "width": "100%",
        "height": "100%",
        "locale": "en",
        "darkMode": true,
        "groups": [
            {
                "title": "Stocks",
                "symbols": [["AAPL", "NASDAQ:AAPL"]],
                "showSymbolLogo": true
            },
            {
                "title": "Indices",
                "symbols": [["S&P 500", "OANDA:SPX500USD"]],
                "showSymbolLogo": true
            }
        ],
        "isTransparent": false,
        "showSymbolLogo": true
    });
    </script>
</body>
</html>
