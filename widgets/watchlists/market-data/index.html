<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Market Data Widget</title>
    <style>
        body { margin: 0; padding: 0; background: #131722; height: 100vh; }
        #widget-container { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="widget-container"></div>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
    window.addEventListener('DOMContentLoaded', function() {
        new TradingView.widget({
            "width": "100%",
            "height": "100%",
            "locale": "en",
            "darkMode": true,
            "groups": [
                {
                    "title": "Stocks",
                    "symbols": [["AAPL", "NASDAQ:AAPL"]],
                    "showSymbolLogo": true
                },
                {
                    "title": "Indices",
                    "symbols": [["S&P 500", "OANDA:SPX500USD"]],
                    "showSymbolLogo": true
                }
            ],
            "isTransparent": false,
            "showSymbolLogo": true
        });
    });
    </script>
</body>
</html>
