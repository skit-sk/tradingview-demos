<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Market Overview Widget</title>
    <style>
        body { margin: 0; padding: 0; background: #131722; }
        #widget-container { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="widget-container"></div>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
    new TradingView.widget({
        "width": "100%",
        "height": "100%",
        "locale": "en",
        "darkMode": true,
        "groups": [
            {
                "title": "Indices",
                "symbols": [
                    ["S&P 500", "OANDA:SPX500USD"],
                    ["NASDAQ", "OANDA:NS100USD"],
                    ["Dow Jones", "OANDA:DJIUSD"]
                ],
                "showSymbolLogo": true,
                "showSymbolLabel": true
            },
            {
                "title": "Crypto",
                "symbols": [
                    ["Bitcoin", "BITSTAMP:BTCUSD"],
                    ["Ethereum", "BITSTAMP:ETHUSD"]
                ],
                "showSymbolLogo": true,
                "showSymbolLabel": true
            }
        ]
    });
    </script>
</body>
</html>
