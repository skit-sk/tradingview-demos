<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ticker Widget</title>
    <style>
        body { margin: 0; padding: 0; background: #0F0F0F; height: 100vh; overflow: hidden; }
        .tradingview-widget-container { width: 100%; height: 100%; position: relative; }
        .tradingview-widget-container__widget { width: 100%; height: 100%; }
        .tradingview-widget-copyright { display: none; }
    </style>
</head>
<body>
<div class="tradingview-widget-container">
  <div class="tradingview-widget-container__widget"></div>
  <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker.js" async>
  {
  "symbols": [
    ["BTCUSD", "BINANCE:BTCUSD|1D"],
    ["ETHUSD", "BINANCE:ETHUSD|1D"]
  ],
  "showSymbolLogo": true,
  "isTransparent": false,
  "showVolume": false,
  "colorTheme": "dark",
  "locale": "en",
  "width": "100%",
  "height": "100%"
}
  </script>
</div>
</body>
</html>
