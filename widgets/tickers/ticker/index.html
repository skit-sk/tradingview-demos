<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ticker Widget</title>
    <style>
        body { margin: 0; padding: 0; background: #131722; height: 100vh; }
        #widget-container { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="widget-container"></div>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
    window.addEventListener('DOMContentLoaded', function() {
        new TradingView.widget({
            "width": "100%",
            "height": "100%",
            "locale": "en",
            "darkMode": true,
            "symbols": [
                ["BTCUSD", "BITSTAMP:BTCUSD|1D"],
                ["ETHUSD", "BITSTAMP:ETHUSD|1D"]
            ],
            "showSymbolLogo": true,
            "isTransparent": false,
            "showVolume": false
        });
    });
    </script>
</body>
</html>
