<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ticker Tape Widget</title>
    <style>body { margin: 0; padding: 0; background: #131722; }</style>
</head>
<body>
    <div id="widget-container"></div>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
    new TradingView.widget({
        "width": "100%",
        "height": 80,
        "locale": "en",
        "darkMode": true,
        "symbols": [
            ["BTC/USD", "BITSTAMP:BTCUSD"],
            ["ETH/USD", "BITSTAMP:ETHUSD"],
            ["S&P 500", "OANDA:SPX500USD"],
            ["EUR/USD", "OANDA:EURUSD"]
        ],
        "showSymbolLogo": true,
        "showVolume": true,
        "isTransparent": false,
        "displayMode": "adaptive"
    });
    </script>
</body>
</html>
