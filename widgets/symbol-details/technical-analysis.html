<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Technical Analysis Widget</title>
    <style>
        body { margin: 0; padding: 0; background: #131722; }
        #widget-container { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="widget-container"></div>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
    new TradingView.widget({
        "width": "100%",
        "height": "100%",
        "locale": "en",
        "darkMode": true,
        "symbol": "NASDAQ:AAPL",
        "isTransparent": false,
        "showIntervalUI": true,
        "showSymbolLogo": true,
        "showToolbar": true
    });
    </script>
</body>
</html>
