<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Multi-Pane Chart</title>
    <style>
        body { margin: 0; padding: 0; background: #131722; }
        #container { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="container"></div>
    <script>
        (async function() {
            const response = await fetch('https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.development.js');
            const scriptText = await response.text();
            const scriptEl = document.createElement('script');
            scriptEl.textContent = scriptText;
            document.head.appendChild(scriptEl);

            const { createChart, CandlestickSeries, HistogramSeries } = window.LightweightCharts;

            const chart = createChart(document.getElementById('container'), {
                layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
                addDefaultPane: false,
                width: window.innerWidth,
                height: window.innerHeight,
            });

            const klinesRes = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1h&limit=100');
            const klines = await klinesRes.json();

            const candleData = klines.map(k => ({
                time: k[0] / 1000,
                open: parseFloat(k[1]),
                high: parseFloat(k[2]),
                low: parseFloat(k[3]),
                close: parseFloat(k[4]),
            }));

            const volumeData = klines.map(k => ({
                time: k[0] / 1000,
                value: parseFloat(k[5]),
                color: parseFloat(k[4]) >= parseFloat(k[1]) ? 'rgba(38, 166, 154, 0.5)' : 'rgba(239, 83, 80, 0.5)',
            }));

            const mainPane = chart.addPane(1);
            mainPane.addSeries(CandlestickSeries, {
                upColor: '#26a69a',
                downColor: '#ef5350',
                borderVisible: false,
                wickUpColor: '#26a69a',
                wickDownColor: '#ef5350',
            }).setData(candleData);

            const volumePane = chart.addPane(2);
            volumePane.addSeries(HistogramSeries, { color: '#26a69a' }).setData(volumeData);

            chart.timeScale().fitContent();

            window.addEventListener('resize', () => {
                chart.applyOptions({ width: window.innerWidth, height: window.innerHeight });
            });
        })();
    </script>
</body>
</html>
