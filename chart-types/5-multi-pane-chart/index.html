<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5. Multi-Pane Chart | TradingView Demos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', sans-serif; background: #fafafa; padding: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; color: #131722; }
        p { color: #5c636a; margin-bottom: 20px; max-width: 800px; }
        .description { background: #fff; border: 1px solid #e3e8ee; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
        .chart-container { background: #fff; border: 1px solid #e3e8ee; border-radius: 8px; overflow: hidden; }
        #container { width: 100%; height: 500px; }
        .code-link { display: inline-block; margin-top: 16px; color: #2962ff; text-decoration: none; }
    </style>
</head>
<body>
    <h1>5. Multi-Pane Chart</h1>
    <div class="description">
        <strong>Функция:</strong> <code>createChart()</code> + <code>addPane()</code><br>
        <strong>Горизонтальная шкала:</strong> Time + Panes API (v5.0+)<br>
        <strong>Когда использовать:</strong> Несколько панелей — например, график + объём + индикаторы в отдельных панелях.
    </div>
    <div class="chart-container">
        <div id="container"></div>
    </div>
    <a class="code-link" href="../share/knowledge-base/tradingview/chart-types/5-multi-pane-chart.md">📄 Documentation</a>

    <script src="https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.development.js"></script>
    <script>
        function generateData(numPoints = 100) {
            const data = [];
            const date = new Date(Date.UTC(2024, 0, 1, 12, 0, 0, 0));
            let value = 100;
            for (let i = 0; i < numPoints; i++) {
                value += (Math.random() - 0.48) * 2;
                data.push({
                    time: date.getTime() / 1000,
                    open: value,
                    high: value + Math.random() * 2,
                    low: value - Math.random() * 2,
                    close: value + (Math.random() - 0.5),
                });
                date.setUTCDate(date.getUTCDate() + 1);
            }
            return data;
        }

        const chartOptions = {
            layout: {
                background: { type: 'solid', color: '#ffffff' },
                textColor: '#333333',
            },
            addDefaultPane: false,
            autoSize: true,
            width: 800,
            height: 500,
        };

        const chart = createChart(document.getElementById('container'), chartOptions);

        // Pane 1: Main chart with candlesticks
        const mainPane = chart.addPane(1);
        const candlestickSeries = mainPane.addSeries(CandlestickSeries, {
            upColor: '#26a69a',
            downColor: '#ef5350',
            borderVisible: false,
            wickUpColor: '#26a69a',
            wickDownColor: '#ef5350',
        });
        candlestickSeries.setData(generateData(100));

        // Pane 2: Volume histogram
        const volumePane = chart.addPane(2);
        const volumeSeries = volumePane.addSeries(HistogramSeries, {
            color: '#26a69a',
        });
        const volumeData = generateData(100).map(d => ({
            time: d.time,
            value: Math.abs(d.close - d.open) * 1000,
            color: d.close >= d.open ? 'rgba(38, 166, 154, 0.5)' : 'rgba(239, 83, 80, 0.5)',
        }));
        volumeSeries.setData(volumeData);

        chart.timeScale().fitContent();
    </script>
</body>
</html>
