<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1. Standard Time-Based Chart | TradingView Demos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', sans-serif; background: #131722; color: #d1d4dc; padding: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; color: #fff; }
        .description { background: #1e222d; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
        .chart-container { background: #1e222d; border-radius: 8px; overflow: hidden; }
        #container { width: 100%; height: 400px; }
        .code-link { display: inline-block; margin-top: 16px; color: #2962ff; text-decoration: none; }
        .symbol-badge { display: inline-block; background: #2962ff; color: #fff; padding: 4px 12px; border-radius: 4px; font-size: 14px; margin-left: 10px; }
        #log { margin-top: 20px; color: #0f0; white-space: pre-wrap; font-size: 12px; display: none; }
    </style>
</head>
<body>
    <h1>1. Standard Time-Based Chart<span class="symbol-badge">BTCUSDT 1h</span></h1>
    <div class="description">
        <strong>Функция:</strong> <code>createChart()</code><br>
        <strong>Горизонтальная шкала:</strong> Time (UTC timestamp)<br>
        <strong>Когда использовать:</strong> Стандартный график для свечей, линий, баров — любой финансовый данные по времени.<br>
        <strong>Source:</strong> Binance API
    </div>
    <div class="chart-container">
        <div id="container"></div>
    </div>
    <div id="log"></div>
    <a class="code-link" href="../share/knowledge-base/tradingview/chart-types/1-standard-time-chart.md">📄 Documentation</a>

    <script>
        function log(msg) {
            console.log(msg);
            document.getElementById('log').textContent += msg + '\n';
            document.getElementById('log').style.display = 'block';
        }

        async function init() {
            log('Loading library...');

            const response = await fetch('https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.development.js');
            const scriptText = await response.text();

            const scriptEl = document.createElement('script');
            scriptEl.textContent = scriptText;
            document.head.appendChild(scriptEl);

            const { createChart, CandlestickSeries } = window.LightweightCharts;
            log('Library loaded');

            const chart = createChart(document.getElementById('container'), {
                layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#1e222d' }, horzLines: { color: '#1e222d' } },
                width: 800,
                height: 400,
            });

            const candlestickSeries = chart.addSeries(CandlestickSeries, {
                upColor: '#26a69a',
                downColor: '#ef5350',
                borderVisible: false,
                wickUpColor: '#26a69a',
                wickDownColor: '#ef5350',
            });

            const klinesRes = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1h&limit=200');
            const klines = await klinesRes.json();

            const candleData = klines.map(k => ({
                time: k[0] / 1000,
                open: parseFloat(k[1]),
                high: parseFloat(k[2]),
                low: parseFloat(k[3]),
                close: parseFloat(k[4]),
            }));

            candlestickSeries.setData(candleData);
            chart.timeScale().fitContent();
            log('Chart rendered with ' + candleData.length + ' candles');
        }

        init().catch(e => log('ERROR: ' + e.message));
    </script>
</body>
</html>
