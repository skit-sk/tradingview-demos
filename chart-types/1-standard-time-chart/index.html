<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1. Standard Time-Based Chart | TradingView Demos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', sans-serif; background: #fafafa; padding: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; color: #131722; }
        p { color: #5c636a; margin-bottom: 20px; max-width: 800px; }
        .description { background: #fff; border: 1px solid #e3e8ee; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
        .chart-container { background: #fff; border: 1px solid #e3e8ee; border-radius: 8px; overflow: hidden; }
        #container { width: 100%; height: 400px; }
        .code-link { display: inline-block; margin-top: 16px; color: #2962ff; text-decoration: none; }
    </style>
</head>
<body>
    <h1>1. Standard Time-Based Chart</h1>
    <div class="description">
        <strong>Функция:</strong> <code>createChart()</code><br>
        <strong>Горизонтальная шкала:</strong> Time (UTC timestamp)<br>
        <strong>Когда использовать:</strong> Стандартный график для свечей, линий, баров — любой финансовый данные по времени.
    </div>
    <div class="chart-container">
        <div id="container"></div>
    </div>
    <a class="code-link" href="../share/knowledge-base/tradingview/chart-types/1-standard-time-chart.md">📄 Documentation</a>

    <script src="https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.development.js"></script>
    <script>
        function generateSampleData(numberOfPoints = 500) {
            const data = [];
            const date = new Date(Date.UTC(2024, 0, 1, 12, 0, 0, 0));
            let value = 100;
            for (let i = 0; i < numberOfPoints; i++) {
                value += (Math.random() - 0.48) * 2;
                data.push({
                    time: date.getTime() / 1000,
                    open: value,
                    high: value + Math.random() * 3,
                    low: value - Math.random() * 3,
                    close: value + (Math.random() - 0.5) * 2,
                });
                date.setUTCDate(date.getUTCDate() + 1);
            }
            return data;
        }

        const chartOptions = {
            layout: {
                background: { type: 'solid', color: '#ffffff' },
                textColor: '#333333',
            },
            grid: {
                vertLines: { color: '#e0e0e0' },
                horzLines: { color: '#e0e0e0' },
            },
            autoSize: true,
            width: 800,
            height: 400,
        };

        const chart = createChart(document.getElementById('container'), chartOptions);

        const candlestickSeries = chart.addSeries(CandlestickSeries, {
            upColor: '#26a69a',
            downColor: '#ef5350',
            borderVisible: false,
            wickUpColor: '#26a69a',
            wickDownColor: '#ef5350',
        });

        candlestickSeries.setData(generateSampleData(200));
        chart.timeScale().fitContent();
    </script>
</body>
</html>
