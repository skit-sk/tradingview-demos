<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2. Yield Curve Chart | TradingView Demos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', sans-serif; background: #fafafa; padding: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; color: #131722; }
        p { color: #5c636a; margin-bottom: 20px; max-width: 800px; }
        .description { background: #fff; border: 1px solid #e3e8ee; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
        .chart-container { background: #fff; border: 1px solid #e3e8ee; border-radius: 8px; overflow: hidden; }
        #container { width: 100%; height: 400px; }
        .code-link { display: inline-block; margin-top: 16px; color: #2962ff; text-decoration: none; }
    </style>
</head>
<body>
    <h1>2. Yield Curve Chart</h1>
    <div class="description">
        <strong>Функция:</strong> <code>createYieldCurveChart()</code><br>
        <strong>Горизонтальная шкала:</strong> Linear (месяцы/duration units)<br>
        <strong>Когда использовать:</strong> Yield curves — облигации, процентные ставки. Горизонтальная ось = срок погашения в месяцах.
    </div>
    <div class="chart-container">
        <div id="container"></div>
    </div>
    <a class="code-link" href="../share/knowledge-base/tradingview/chart-types/2-yield-curve-chart.md">📄 Documentation</a>

    <script src="https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.development.js"></script>
    <script>
        const chartOptions = {
            layout: {
                background: { type: 'solid', color: '#ffffff' },
                textColor: '#333333',
            },
            yieldCurve: {
                baseResolution: 1,
                minimumTimeRange: 10,
                startTimeRange: 3,
            },
            handleScroll: false,
            handleScale: false,
            width: document.getElementById('container').clientWidth,
            height: 400,
        };

        const chart = createYieldCurveChart(document.getElementById('container'), chartOptions);

        const lineSeries = chart.addSeries(LineSeries, {
            color: '#2962FF',
            lineWidth: 2,
        });

        // Yield curve data: time = months, value = interest rate %
        const curveData = [
            { time: 1, value: 5.378 },
            { time: 2, value: 5.372 },
            { time: 3, value: 5.271 },
            { time: 6, value: 5.094 },
            { time: 12, value: 4.739 },
            { time: 24, value: 4.237 },
            { time: 36, value: 4.036 },
            { time: 60, value: 3.887 },
            { time: 84, value: 3.921 },
            { time: 120, value: 4.007 },
            { time: 240, value: 4.366 },
            { time: 360, value: 4.290 },
        ];

        lineSeries.setData(curveData);
        chart.timeScale().fitContent();

        window.addEventListener('resize', () => {
            chart.applyOptions({ width: document.getElementById('container').clientWidth });
        });
    </script>
</body>
</html>
