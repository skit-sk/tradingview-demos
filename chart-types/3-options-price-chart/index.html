<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3. Options Price Chart | TradingView Demos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', sans-serif; background: #fafafa; padding: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; color: #131722; }
        p { color: #5c636a; margin-bottom: 20px; max-width: 800px; }
        .description { background: #fff; border: 1px solid #e3e8ee; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
        .chart-container { background: #fff; border: 1px solid #e3e8ee; border-radius: 8px; overflow: hidden; }
        #container { width: 100%; height: 400px; }
        .code-link { display: inline-block; margin-top: 16px; color: #2962ff; text-decoration: none; }
    </style>
</head>
<body>
    <h1>3. Options Price Chart (Price-Based)</h1>
    <div class="description">
        <strong>Функция:</strong> <code>createOptionsChart()</code><br>
        <strong>Горизонтальная шкала:</strong> Price (numeric)<br>
        <strong>Когда использовать:</strong> Option chains, price distributions — когда цена важнее времени. X-ось =数值price.
    </div>
    <div class="chart-container">
        <div id="container"></div>
    </div>
    <a class="code-link" href="../share/knowledge-base/tradingview/chart-types/3-options-price-chart.md">📄 Documentation</a>

    <script src="https://unpkg.com/lightweight-charts@5.2.0/dist/lightweight-charts.standalone.development.js"></script>
    <script>
        const chartOptions = {
            layout: {
                background: { type: 'solid', color: '#ffffff' },
                textColor: '#333333',
            },
            width: document.getElementById('container').clientWidth,
            height: 400,
        };

        const chart = createOptionsChart(document.getElementById('container'), chartOptions);

        const lineSeries = chart.addSeries(LineSeries, {
            color: '#2962FF',
            lineWidth: 2,
        });

        // Generate synthetic option chain data
        const data = [];
        for (let i = 0; i < 100; i++) {
            data.push({
                time: i * 0.5,
                value: Math.sin(i / 10) * 10 + 100,
            });
        }

        lineSeries.setData(data);
        chart.timeScale().fitContent();

        window.addEventListener('resize', () => {
            chart.applyOptions({ width: document.getElementById('container').clientWidth });
        });
    </script>
</body>
</html>
