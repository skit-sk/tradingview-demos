<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Symbol Overview - Iframe Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #131722; height: 100vh; display: flex; gap: 20px; padding: 20px; }
        .panel { flex: 1; border: 1px solid #333; height: 100%; }
        .panel-title { background: #222; color: #fff; padding: 10px; text-align: center; }
    </style>
</head>
<body>
<div class="panel">
    <div class="panel-title">Iframe Method</div>
    <iframe
        src="https://www.tradingview-widget.com/embed-widget/symbol-overview/?locale=en#%7B%22width%22%3A%22100%25%22%2C%22height%22%3A%22100%25%22%2C%22symbol%22%3A%22BINANCE%3ABTCUSDT%22%2C%22colorTheme%22%3A%22dark%22%2C%22autosize%22%3Atrue%2C%22utm_source%22%3A%22test%22%7D"
        style="width: 100%; height: calc(100% - 40px); border: none;"
        sandbox="allow-scripts allow-same-origin allow-popups allow-forms"
        loading="lazy">
    </iframe>
</div>
<div class="panel">
    <div class="panel-title">Script Method (defer)</div>
    <div id="widget" style="width: 100%; height: calc(100% - 40px);"></div>
    <script src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" defer>
{
"symbol": "BINANCE:BTCUSDT",
"width": "100%",
"height": "100%",
"locale": "en",
"colorTheme": "dark",
"isTransparent": false,
"autosize": true
}
</script>
</div>
</body>
</html>
