<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Market Overview</title>
    <style>
        body { margin: 0; padding: 0; background: #131722; height: 100vh; }
        .tradingview-widget-container { width: 100%; height: 100%; }
    </style>
</head>
<body>
<div class="tradingview-widget-container">
  <div class="tradingview-widget-container__widget"></div>
</div>
<script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
{
"colorTheme": "dark",
"dateRange": "1M",
"showChart": true,
"locale": "en",
"width": "100%",
"height": "100%",
"groups": [
    {
      "title": "Indices",
      "symbols": [
        ["OANDA:SPX500USD", "S&P 500"],
        ["OANDA:NS100USD", "NASDAQ"],
        ["OANDA:DJIUSD", "Dow Jones"]
      ],
      "showSymbolLogo": true,
      "showSymbolLabel": true
    },
    {
      "title": "Crypto",
      "symbols": [
        ["BINANCE:BTCUSD", "Bitcoin"],
        ["BINANCE:ETHUSD", "Ethereum"]
      ],
      "showSymbolLogo": true,
      "showSymbolLabel": true
    }
  ]
}
</script>
</body>
</html>
