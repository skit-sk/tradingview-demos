<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Symbol Overview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #131722; height: 100vh; overflow: hidden; }
        .widget-wrapper { width: 100%; height: 100%; position: relative; }
        .widget-fallback { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; font-family: -apple-system, sans-serif; z-index: 1; transition: opacity 0.3s; }
        .widget-fallback.hidden { opacity: 0; pointer-events: none; }
        .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #2962FF; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="widget-wrapper" id="wrapper">
    <div class="widget-fallback" id="fallback">
        <div class="spinner"></div>
        <p style="margin-top: 15px;">Loading TradingView widget...</p>
    </div>
</div>

<script>
(function() {
    function createWidget() {
        var container = document.getElementById('wrapper');
        var fallback = document.getElementById('fallback');

        var config = {
            "width": "100%",
            "height": "100%",
            "symbol": "BINANCE:BTCUSDT",
            "colorTheme": "dark",
            "isTransparent": false,
            "autosize": true,
            "dateRange": "1M",
            "showVolume": true,
            "showMA": true
        };

        var iframe = document.createElement('iframe');
        iframe.src = 'https://www.tradingview-widget.com/embed-widget/symbol-overview/?locale=en#' + encodeURIComponent(JSON.stringify(config));

        iframe.style.width = '100%';
        iframe.style.height = '100%';
        iframe.style.border = 'none';
        iframe.setAttribute('frameborder', '0');
        iframe.setAttribute('scrolling', 'no');
        iframe.setAttribute('allowtransparency', 'true');
        iframe.setAttribute('title', 'Symbol Overview TradingView widget');

        iframe.onload = function() {
            fallback.classList.add('hidden');
            setTimeout(function() {
                fallback.style.display = 'none';
            }, 300);
        };

        iframe.onerror = function() {
            fallback.innerHTML = '<p style="color:#ef5350;">Failed to load widget</p><button onclick="location.reload()" style="margin-top:10px;padding:8px 16px;cursor:pointer;">Retry</button>';
        };

        container.appendChild(iframe);
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', createWidget);
    } else {
        createWidget();
    }
})();
</script>
</body>
</html>
